[tool.pytest.ini_options]
# テスト発見パス
testpaths = ["tests"]

# 出力フォーマット
# -ra: スキップ・失敗・エラー・期待外パスの理由をサマリ表示
addopts = "-ra"

# カスタムマーカー登録
# - slow: PDF 実生成など重いテスト（デフォルトでは含むが除外可能）
# - requires_sample: サンプル Excel が必要なテスト
# - requires_chromium: Playwright + Chromium が必要なテスト
markers = [
    "slow: 重いテスト（PDF 実生成等）。`pytest -m 'not slow'` で除外可能",
    "requires_sample: サンプル Excel が必要。Excel が無ければ自動 skip",
    "requires_chromium: Playwright Chromium が必要。未インストール時は skip",
]

# 警告フィルタ
# pypdf がフォントマップ抽出時に出すノイズ警告を抑制（PDF 自体は正常）
filterwarnings = [
    "ignore::DeprecationWarning:pypdf.*",
]

[tool.ruff]
# kouji-genka は dev-app 配下に置かれているが別 git repo (kouji-genka-app.git) で
# 独自に Biome で lint されている。dev-app 側の ruff でチェックすると当該 repo の
# 管轄外コードの違反まで報告されるため除外する。
extend-exclude = ["skills/kouji-genka"]
