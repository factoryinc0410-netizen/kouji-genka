# ================================================================
#  Factoryskills - Nginx リバースプロキシ設定
#  配置先: /etc/nginx/sites-available/factoryskills.conf
#  有効化: /etc/nginx/sites-enabled/factoryskills.conf にシンボリックリンク
#
#  対応する uvicorn (systemd) は deploy/systemd/factoryskills.service を使い、
#  127.0.0.1:8001 でローカルバインドしている前提。
#
#  インストール:
#    sudo cp deploy/nginx/factoryskills.conf /etc/nginx/sites-available/
#    sudo ln -s /etc/nginx/sites-available/factoryskills.conf \
#               /etc/nginx/sites-enabled/factoryskills.conf
#    sudo nginx -t                          # 構文チェック
#    sudo systemctl reload nginx
#
#  HTTPS 化:
#    本ファイルは HTTP (port 80) のみを扱う基本構成。本番では certbot 等で
#    Let's Encrypt 証明書を発行し、443 listener と HTTP→HTTPS リダイレクトを
#    追加することを推奨する。例:
#      sudo certbot --nginx -d factoryskills.example.com
#    certbot は本ファイルに 443 ブロックを追記し、80 ブロックをリダイレクトに
#    書き換える。
# ================================================================

# ── アップストリーム (uvicorn) ──
# systemd ユニット (factoryskills.service) が 127.0.0.1:8001 で起動している前提。
upstream factoryskills_app {
    server 127.0.0.1:8001 fail_timeout=5s max_fails=3;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;

    # 環境のホスト名に合わせて書き換える。
    # 例: factoryskills.example.com / 192.168.1.10 / _ (ワイルドカード)
    server_name _;

    # ── アクセスログ ──
    access_log /var/log/nginx/factoryskills_access.log;
    error_log  /var/log/nginx/factoryskills_error.log;

    # ── アップロードサイズ ──
    # 資格者証アップロード (PDF/JPG/PNG, 最大 20 MB × 5 枚) を許容するため
    # 100 MB に余裕を持たせる。.env の MAX_UPLOAD_SIZE_MB と整合させること。
    client_max_body_size 100M;

    # ── プロキシヘッダ ──
    # アプリ側で接続元 IP / プロトコルを認識できるよう転送する。
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket / SSE 用 (将来の拡張に備えて常時有効化しておく)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ── タイムアウト ──
    # PDF 生成 / OCR ジョブの待ち合わせを考慮して 5 分まで許容する。
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── バッファリング ──
    # ストリーミング (CSV / PDF) を妨げないよう小さめに。
    proxy_buffering   off;
    proxy_request_buffering off;

    # ── ヘルスチェック (認証不要) ──
    location = /health {
        proxy_pass http://factoryskills_app;
        access_log off;
    }

    # ── 静的ファイル ──
    # uvicorn が StaticFiles で配信しているが、Nginx 経由でも問題ない。
    # 必要なら下記コメントを外して Nginx から直接配信して負荷を下げる:
    # location /static/ {
    #     alias /home/ubuntu/dev-app/web_app/static/;
    #     expires 1h;
    #     add_header Cache-Control "public";
    # }

    # ── 全リクエストをアプリへ転送 ──
    location / {
        proxy_pass http://factoryskills_app;
    }
}
